<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AgenTrio Operational Control Center{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0A0B14;
            color: #FFFFFF;
            margin: 0;
            padding: 0;
        }
        .nav-bar {
            background-color: #111322;
            border-bottom: 2px solid #1E293B;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .nav-links a {
            color: #94A3B8;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #00E5FF;
        }
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            background: #111322; 
            border: 1px solid #1E2238;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            margin-bottom: 30px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 24px;
            color: #FFFFFF;
            border-left: 4px solid #FF7D00; 
            padding-left: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; color: #94A3B8; }
        select, input[type="text"], input[type="file"], textarea {
            width: 100%; padding: 12px; border: 1px solid #2E3456; border-radius: 6px;
            font-size: 14px; background-color: #0A0B14; color: #FFFFFF;
        }
        button {
            background-color: #FF7D00; color: #0A0B14; border: none; padding: 14px 20px;
            font-size: 14px; font-weight: 700; border-radius: 6px; cursor: pointer;
            width: 100%; text-transform: uppercase; letter-spacing: 0.5px;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="nav-logo">AgenTrio <span style="color: #00E5FF; font-size: 12px;">v2.0</span></div>
        <div class="nav-links">
            <a href="{% url 'select_mode' %}">[ Home ]</a>
            <a href="{% url 'dashboard' %}">[ dashboard ]</a>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
