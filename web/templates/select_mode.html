{% extends 'base.html' %}

{% block content %}
<header style="margin-bottom: 30px;">
    <h1>Step 1: Select Processing Engine Mode</h1>
    <p style="color: #64748B; margin: 5px 0 0 0; font-size: 14px;">Decouple the pipeline loop layout early</p>
</header>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 class="card-title">Choose Execution Target</h2>
    <form method="GET" action="{% url 'config_form' %}">
        <div class="form-group">
            <label for="mode">Available Multi-Agent Architectures</label>
            <select name="mode" id="mode">
                <option value="ACL">Tri-Agent ACL Generator (Analyst -> Coder -> Tester)</option>
                <option value="CURATOR">Tri-Agent ArtiCurator (Snatcher -> Writer -> Editor)</option>
            </select>
        </div>
        <button type="submit">Proceed to Configuration</button>
    </form>
</div>
{% endblock %}
